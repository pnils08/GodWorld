model: openrouter/deepseek/deepseek-chat
env-file: .env

# engine.9 (S274): propose-then-review. Aider edits the working tree but does NOT
# commit — you (or a reviewing model) check the diff before anything lands. This is
# what was missing: Aider had auto-commit ON and wrote straight to main unreviewed.
auto-commits: false

# engine.9 iron fence (S274): real test gate. `npm test` -> scripts/run-tests.js
# (NOT `npm run test:unit`=vitest, which is structurally red — every .test.js is a
# process.exit harness with no vitest config). run-tests.js exits non-zero on any
# failure and exercises utilities/ + phase05 transitively via scripts/*.test.js —
# proven to catch the engine.42 ctx-ReferenceError regression. auto-test REQUIRED
# (defaults false): test-cmd alone only enables manual /test, not the auto-gate.
test-cmd: npm test
auto-test: true

# engine.9 (S274): always load the rules file so Aider sees the engine landmines
# + canon rules every run (was authored but never wired — Aider never read it).
read: CONVENTIONS.md
